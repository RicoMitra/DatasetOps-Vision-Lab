name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python engine
        run: python -m pip install -e "engine/python[test]"

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Web tests
        run: pnpm test

      - name: Engine tests
        run: pnpm engine:test

      - name: Build
        run: pnpm build
